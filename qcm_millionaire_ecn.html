<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qui veut gagner des millions ? - ECN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c14;--card:#141827;--card2:#1e2236;--accent:#6c63ff;--accent2:#ff6584;--green:#2ecc71;--red:#e74c3c;--gold:#f1c40f;--text:#e0e0e8;--muted:#8888a0;--border:#2a2d3e;--radius:12px;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;line-height:1.6;}
h1{font-size:1.8rem;margin-bottom:4px;background:linear-gradient(135deg,var(--gold),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
.container{max-width:750px;width:100%;}
.game-layout{display:flex;gap:20px;align-items:flex-start;}
.main-area{flex:1;min-width:0;}
.ladder{width:160px;flex-shrink:0;}
.ladder-step{padding:6px 10px;font-size:.78rem;border-radius:6px;margin-bottom:3px;background:var(--card2);border:1px solid var(--border);display:flex;justify-content:space-between;transition:all .3s;}
.ladder-step.current{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.ladder-step.done{background:rgba(46,204,113,.15);border-color:var(--green);color:var(--green);}
.ladder-step.safe{border-left:3px solid var(--gold);}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--accent2));}
.ch-badge{display:inline-block;background:var(--accent);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:99px;margin-bottom:10px;font-weight:700;}
.q-text{font-size:1.05rem;font-weight:600;margin-bottom:18px;line-height:1.5;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.opt-btn{padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.92rem;cursor:pointer;transition:all .3s;text-align:left;}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(241,196,15,.08);}
.opt-btn.correct{border-color:var(--green);background:rgba(46,204,113,.2);color:var(--green);}
.opt-btn.wrong{border-color:var(--red);background:rgba(231,76,60,.2);color:var(--red);}
.opt-btn.eliminated{opacity:.25;pointer-events:none;}
.opt-btn:disabled{cursor:not-allowed;}
.opt-btn .letter{color:var(--gold);font-weight:700;margin-right:8px;}
.jokers{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.joker-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card2);color:var(--text);font-size:.82rem;cursor:pointer;transition:all .2s;}
.joker-btn:hover:not(:disabled){border-color:var(--gold);}
.joker-btn:disabled{opacity:.3;cursor:not-allowed;}
.joker-btn.used{opacity:.3;text-decoration:line-through;}
.hint-box{padding:12px 16px;background:rgba(108,99,255,.1);border:1px solid var(--accent);border-radius:8px;margin-top:12px;font-size:.9rem;animation:popIn .3s ease;}
.audience-box{padding:12px 16px;background:rgba(241,196,15,.08);border:1px solid var(--gold);border-radius:8px;margin-top:12px;font-size:.85rem;animation:popIn .3s ease;}
.audience-bar{display:flex;align-items:center;gap:8px;margin-top:4px;}
.audience-bar .bar{flex:1;height:16px;background:var(--card);border-radius:4px;overflow:hidden;}
.audience-bar .bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .5s;}
.audience-bar .pct{width:35px;font-size:.8rem;font-weight:700;}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.15);}
.btn-gold{background:var(--gold);color:#000;}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.feedback{padding:14px 18px;border-radius:8px;margin-top:14px;font-weight:600;animation:popIn .35s ease;}
.feedback.correct{background:rgba(46,204,113,.15);border:1px solid var(--green);color:var(--green);}
.feedback.wrong{background:rgba(231,76,60,.15);border:1px solid var(--red);color:var(--red);}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.results-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;}
.results-card h2{text-align:center;margin-bottom:6px;}
.final-score{text-align:center;font-size:2.2rem;font-weight:800;margin:10px 0;background:linear-gradient(135deg,var(--gold),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.final-sub{text-align:center;color:var(--muted);margin-bottom:20px;}
.start-screen{text-align:center;padding:40px 20px;}
.start-screen p{color:var(--muted);max-width:500px;margin:14px auto;}
.start-icon{font-size:4rem;margin-bottom:10px;}
.rules{text-align:left;background:var(--card2);border-radius:8px;padding:16px 20px;margin:18px 0;font-size:.9rem;color:var(--muted);}
.rules li{margin-bottom:4px;list-style:disc inside;}
@media(max-width:700px){
  .game-layout{flex-direction:column-reverse;}
  .ladder{width:100%;display:flex;flex-wrap:wrap;gap:4px;}
  .ladder-step{flex:1;min-width:60px;font-size:.7rem;text-align:center;justify-content:center;}
  .options{grid-template-columns:1fr;}
  body{padding:12px;}
}
</style>
</head>

    <p class="subtitle">Education a la Citoyennete Numerique (ECN) — ${chLabel}</p>
    <div class="start-screen">
      <div class="start-icon">&#128176;</div>
      <h2>Devenez millionnaire du savoir !</h2>
      <p>15 questions de difficulte croissante, tirees parmi ${filteredBANK.length}+ questions. 3 jokers pour vous aider !</p>
      <ul class="rules">
        <li>15 paliers de 100 a 1 000 000 EUR</li>
        <li>Paliers de securite : 1 000 EUR, 32 000 EUR, 1 000 000 EUR</li>
        <li>Joker 50:50 : elimine 2 mauvaises reponses</li>
        <li>Joker Appel a un ami : affiche un indice</li>
        <li>Joker Vote du public : montre les pourcentages</li>
      </ul>
      <button class="btn btn-gold" onclick="startGame()">Jouer !</button>
    </div>`;
}

function startGame(){
  pool=shuffle([...filteredBANK]).slice(0,Math.min(TOTAL_Q,filteredBANK.length));
  qIdx=0;jokers={fifty:false,friend:false,audience:false};answered=false;eliminated=[];
  showQuestion();
}

function showQuestion(){
  if(qIdx>=TOTAL_Q){showWin();return;}
  currentQ=pool[qIdx];answered=false;eliminated=[];
  render();
}

function render(){
  const q=currentQ;
  const opts=q.o;
  const letters=['A','B','C','D'];
  let ladderHtml='';
  for(let i=TOTAL_Q-1;i>=0;i--){
    const cls=(i===qIdx?'current':'')+(i<qIdx?' done':'')+(SAFE.includes(i)?' safe':'');
    ladderHtml+=`<div class="ladder-step ${cls}"><span>${i+1}</span><span>${LADDER[i].toLocaleString()} EUR</span></div>`;
  }
  let optsHtml=opts.map((o,i)=>{
    const elim=eliminated.includes(i)?'eliminated':'';
    return `<button class="opt-btn ${elim}" id="opt-${i}" onclick="answer(${i})" ${answered?'disabled':''}><span class="letter">${letters[i]}</span>${o}</button>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <h1>Qui veut gagner des millions ?</h1>
    <p class="subtitle">Education a la Citoyennete Numerique</p>
    <div class="game-layout">
      <div class="main-area">
        <div class="question-card">
          <span class="ch-badge">${q.ch}</span>
          <div class="q-text">${q.q}</div>
          <div class="jokers">
            <button class="joker-btn ${jokers.fifty?'used':''}" onclick="useFifty()" ${jokers.fifty||answered?'disabled':''}>50:50</button>
            <button class="joker-btn ${jokers.friend?'used':''}" onclick="useFriend()" ${jokers.friend||answered?'disabled':''}>&#128222; Ami</button>
            <button class="joker-btn ${jokers.audience?'used':''}" onclick="useAudience()" ${jokers.audience||answered?'disabled':''}>&#128101; Public</button>
          </div>
          <div class="options">${optsHtml}</div>
          <div id="extra"></div>
        </div>
      </div>
      <div class="ladder">${ladderHtml}</div>
    </div>`;
}

function answer(i){
  if(answered)return;
  answered=true;
  const q=currentQ;
  const correct=q.o[i]===q.a;
  const correctIdx=q.o.indexOf(q.a);
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt-'+correctIdx).classList.add('correct');
  if(!correct)document.getElementById('opt-'+i).classList.add('wrong');

  const extra=document.getElementById('extra');
  if(correct){
    extra.innerHTML=`<div class="feedback correct">Bonne reponse ! Vous gagnez ${LADDER[qIdx].toLocaleString()} EUR</div>
      <div class="btn-row"><button class="btn btn-gold" onclick="qIdx++;showQuestion()">Question suivante &rarr;</button></div>`;
  } else {
    let safe=0;
    for(let s of SAFE){if(s<qIdx)safe=LADDER[s];}
    extra.innerHTML=`<div class="feedback wrong">Mauvaise reponse ! La bonne reponse etait : ${q.a}<br>Vous repartez avec ${safe.toLocaleString()} EUR</div>
      <div class="btn-row"><button class="btn btn-primary" onclick="init()">&#128260; Rejouer</button></div>`;
  }
}

function useFifty(){
  if(jokers.fifty||answered)return;
  jokers.fifty=true;
  const q=currentQ;
  const correctIdx=q.o.indexOf(q.a);
  let wrong=q.o.map((_,i)=>i).filter(i=>i!==correctIdx);
  shuffle(wrong);
  eliminated=[wrong[0],wrong[1]];
  render();
}

function useFriend(){
  if(jokers.friend||answered)return;
  jokers.friend=true;
  render();
  setTimeout(()=>{
    document.getElementById('extra').innerHTML=`<div class="hint-box">&#128222; <strong>Votre ami dit :</strong> "${currentQ.h}"</div>`;
  },100);
}

function useAudience(){
  if(jokers.audience||answered)return;
  jokers.audience=true;
  const q=currentQ;
  const correctIdx=q.o.indexOf(q.a);
  let pcts=q.o.map((_,i)=>{
    if(eliminated.includes(i))return 0;
    return i===correctIdx?45+Math.floor(Math.random()*25):5+Math.floor(Math.random()*15);
  });
  const total=pcts.reduce((a,b)=>a+b,0);
  pcts=pcts.map(p=>Math.round(p/total*100));
  const letters=['A','B','C','D'];
  render();
  setTimeout(()=>{
    let barsHtml=q.o.map((o,i)=>`<div class="audience-bar"><span>${letters[i]}</span><div class="bar"><div class="bar-fill" style="width:${pcts[i]}%"></div></div><span class="pct">${pcts[i]}%</span></div>`).join('');
    document.getElementById('extra').innerHTML=`<div class="audience-box">&#128101; <strong>Vote du public :</strong>${barsHtml}</div>`;
  },100);
}

function showWin(){
  document.getElementById('app').innerHTML=`
    <h1>Qui veut gagner des millions ?</h1>
    <p class="subtitle">Education a la Citoyennete Numerique</p>
    <div class="results-card">
      <h2>Felicitations !</h2>
      <div class="final-score">1 000 000 EUR</div>
      <div class="final-sub">Vous avez repondu correctement aux 15 questions !</div>
      <div class="btn-row"><button class="btn btn-gold" onclick="init()">&#128260; Rejouer</button></div>
    </div>`;
}

init();
</script>
</body>
</html>
